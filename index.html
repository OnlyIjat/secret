<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>maaf</title>
<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to top right, #ffccd5, #ffe6f0);
}

/* Slider */
.slider {
  display: flex;
  width: 400%;
  height: 100vh;
  transition: transform 1s ease;
}

.slide {
  width: 100%;
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
  padding: 20px;
}

.text {
  font-size: 2em;
  color: #b30059;
  max-width: 80%;
  line-height: 1.5;
  animation: fadeIn 2s ease;
}

/* Fade text */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Flower falling */
.flower {
  position: absolute;
  top: -50px;
  width: 20px;
  height: 20px;
  background: pink;
  border-radius: 50%;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}

/* Heart */
.heart {
  width: 100px;
  height: 90px;
  position: relative;
  animation: beat 1s infinite;
  margin-top: 20px;
}

.heart::before,
.heart::after {
  content: "";
  width: 50px;
  height: 80px;
  background: red;
  position: absolute;
  border-radius: 50px 50px 0 0;
}

.heart::before {
  left: 50px;
  transform: rotate(-45deg);
  transform-origin: 0 100%;
}

.heart::after {
  left: 0;
  transform: rotate(45deg);
  transform-origin: 100% 100%;
}

@keyframes beat {
  0%,100% { transform: scale(1);}
  50% { transform: scale(1.2);}
}

/* Button */
button {
  position: absolute;
  bottom: 30px;
  padding: 12px 25px;
  border: none;
  background: #ff4d88;
  color: white;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
}

/* Balloon */
.balloon {
  width: 40px;
  height: 60px;
  background: #ff6699;
  border-radius: 50%;
  position: absolute;
  bottom: -100px;
  animation: float 6s infinite ease-in;
}

@keyframes float {
  to {
    transform: translateY(-120vh);
  }
}
</style>
</head>
<body>

<div class="slider" id="slider">

  <!-- Slide 1 -->
  <div class="slide">
    <div class="text">hei kamu... 🌸</div>
    <button onclick="nextSlide()">Lanjut</button>
  </div>

  <!-- Slide 2 -->
  <div class="slide">
    <div class="text">
      aku cuma mau bilang...
    </div>
    <button onclick="nextSlide()">Lanjut</button>
  </div>

  <!-- Slide 3 -->
  <div class="slide">
    <div class="text">
      Terima kasih udah hadir<br>
      dan buat dunia aku jadi lebih indah 💕
    </div>
    <button onclick="nextSlide()">Lanjut</button>
  </div>

<!-- Slide 3 -->
  <div class="slide">
    <div class="text">
      maap aku lupa ngucapin, maap aku cuma bisa bkin kmu marah
    </div>
    <button onclick="nextSlide()">Lanjut</button>
  </div>
  
  <!-- Slide 4 -->
  <div class="slide">
    <div class="text">
      🎉 Selamat Ulang Tahun sayang🎂<br>
      Semoga semua impianmu tercapai,<br>
      dan selalu bahagia ❤️
    </div>
    <div class="heart"></div>
  </div>

</div>

<script>
let index = 0;

function nextSlide() {
  index++;
  document.getElementById("slider").style.transform =
    "translateX(-" + index * 100 + "%)";
}

/* Generate flowers */
for (let i = 0; i < 20; i++) {
  let f = document.createElement("div");
  f.className = "flower";
  f.style.left = Math.random() * 100 + "vw";
  f.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(f);
}

/* Generate balloons */
for (let i = 0; i < 10; i++) {
  let b = document.createElement("div");
  b.className = "balloon";
  b.style.left = Math.random() * 100 + "vw";
  b.style.animationDuration = (4 + Math.random() * 6) + "s";
  document.body.appendChild(b);
}
</script>

</body>
</html>
